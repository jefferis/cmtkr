on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { label: 'macOS (latest)', os: macos-latest,    r: 'release' }
          - { label: 'macOS (Intel 15)', os: macos-15-intel,       r: 'release' }
          - { label: 'Linux (release)', os: ubuntu-latest,  r: 'release' }
          - { label: 'Linux (devel)',  os: ubuntu-latest,  r: 'devel' }
          - { label: 'Windows (release)', os: windows-latest, r: 'release' }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RGL_USE_NULL: TRUE

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
